{% extends "network/layout.html" %}

{% block body %}
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Create Account</h2>

            {% if message %}
                <div class="alert alert-danger mb-4" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ message }}
                </div>
            {% endif %}

            <form action="{% url 'register' %}" method="post" class="mb-4">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-control form-control-lg" autofocus type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="email">Email Address</label>
                    <input class="form-control form-control-lg" type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control form-control-lg" type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="confirmation">Confirm Password</label>
                    <input class="form-control form-control-lg" type="password" id="confirmation" name="confirmation" placeholder="Confirm your password" required>
                </div>
                <div class="d-grid">
                    <button class="btn btn-primary btn-lg" type="submit">Register</button>
                </div>
            </form>

            <div class="text-center text-muted">
                Already have an account? <a href="{% url 'login' %}" class="fw-semibold text-primary text-decoration-none">Log In here</a>
            </div>
        </div>
    </div>
{% endblock %}
