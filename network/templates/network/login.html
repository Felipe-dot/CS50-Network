{% extends "network/layout.html" %}

{% block body %}
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2>Welcome Back</h2>

            {% if message %}
                <div class="alert alert-danger mb-4" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ message }}
                </div>
            {% endif %}

            <form action="{% url 'login' %}" method="post" class="mb-4">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="username">Username</label>
                    <input autofocus class="form-control form-control-lg" type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control form-control-lg" type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <div class="d-grid">
                    <button class="btn btn-primary btn-lg" type="submit">Log In</button>
                </div>
            </form>

            <div class="text-center text-muted">
                Don't have an account? <a href="{% url 'register' %}" class="fw-semibold text-primary text-decoration-none">Register here</a>
            </div>
        </div>
    </div>
{% endblock %}
